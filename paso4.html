<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solicitud en proceso | FID by Lakaut</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Open+Sans:wght@400;600;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    img { display: block; }
    button { cursor: pointer; font-family: inherit; border: none; background: none; }

    :root {
      --blue:        #2A39D0;
      --text-dark:   #0b0c0e;
      --text-main:   #3b3a45;
      --text-sub:    #575768;
      --border:      #e1e1eb;
      --border-card: #dee2e6;
      --border-hdr:  #f2f2f8;
      --bg-page:     #f8f9fa;
    }

    html, body {
      min-height: 100%;
      font-family: 'Inter', sans-serif;
      background: var(--bg-page);
    }

    .icon {
      font-family: 'Material Symbols Outlined';
      font-weight: normal;
      font-style: normal;
      font-size: 24px;
      line-height: 1;
      letter-spacing: normal;
      text-transform: none;
      white-space: nowrap;
      -webkit-font-smoothing: antialiased;
      user-select: none;
    }

    /* ─── PAGE ───────────────────────────────────────── */
    .page {
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ─── HEADER ─────────────────────────────────────── */
    .header {
      height: 80px;
      background: #fff;
      border-bottom: 1px solid var(--border-hdr);
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 24px;
      flex-shrink: 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-logo { width: 46px; height: 32px; object-fit: contain; flex-shrink: 0; }

    .header-title {
      flex: 1;
      font-weight: 500;
      font-size: 16px;
      line-height: 24px;
      color: var(--text-main);
      font-feature-settings: "lnum" 1, "tnum" 1;
    }

    .icon-btn {
      width: 40px;
      height: 40px;
      border-radius: 9999px;
      border: 1px solid var(--border);
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--text-main);
      transition: background .15s;
    }

    .icon-btn:hover { background: #f5f5f7; }
    .icon-btn .icon { font-size: 20px; }

    /* ─── CONTENT ────────────────────────────────────── */
    .content-area {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 24px;
    }

    /* ─── CARD ───────────────────────────────────────── */
    .main-card {
      width: 705px;
      height: 484px;
      background: #fff;
      border: 1px solid var(--border-card);
      border-radius: 12px;
      padding: 98px 24px 78px;
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
    }

    /* ─── ILUSTRACIÓN ────────────────────────────────── */
    .success-illustration {
      width: 103px;
      height: 101px;
      object-fit: contain;
      margin-bottom: 52px;
    }

    /* ─── TEXTO ──────────────────────────────────────── */
    .text-content {
      display: flex;
      flex-direction: column;
      gap: 4px;
      align-items: center;
      text-align: center;
      width: 400px;
      margin-bottom: 32px;
    }

    .card-title {
      font-weight: 600;
      font-size: 24px;
      line-height: 32px;
      color: var(--text-main);
      font-feature-settings: "lnum" 1, "tnum" 1;
    }

    .card-subtitle {
      font-weight: 400;
      font-size: 14px;
      line-height: 20px;
      color: var(--text-sub);
      letter-spacing: 0.1px;
      font-feature-settings: "lnum" 1, "tnum" 1;
    }

    /* ─── BOTÓN ──────────────────────────────────────── */
    .btn-inicio {
      width: 265px;
      height: 48px;
      background: var(--blue);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px 16px;
      transition: opacity .15s;
      text-decoration: none;
    }

    .btn-inicio:hover { opacity: .9; }

    .btn-inicio span {
      font-family: 'Open Sans', sans-serif;
      font-weight: 600;
      font-size: 16px;
      color: #fff;
    }
  </style>
</head>
<body>
<div class="page">

  <!-- ── HEADER ── -->
  <header class="header">
    <img class="header-logo"
         src="assets/icons/logo-fid.svg"
         alt="FID by Lakaut" />
    <span class="header-title">Solicitud en proceso</span>
    <button class="icon-btn" onclick="window.location.href='index.html'" aria-label="Cerrar">
      <span class="icon">close</span>
    </button>
  </header>

  <!-- ── CONTENT ── -->
  <main class="content-area">
    <div class="main-card">

      <!-- Ilustración -->
      <img class="success-illustration"
           src="assets/icons/success-illustration.png"
           alt="" />

      <!-- Título + bajada -->
      <div class="text-content">
        <h2 class="card-title">Tu trámite está en proceso</h2>
        <p class="card-subtitle">En un máximo de 48 horas hábiles te enviaremos un mail con el resultado de la validación y los pasos a seguir.</p>
      </div>

      <!-- Botón -->
      <a class="btn-inicio" href="login.html">
        <span>Volver al inicio</span>
      </a>

    </div>
  </main>

</div>
</body>
</html>
