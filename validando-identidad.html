<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Validación de identidad | FID by Lakaut</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Open+Sans:wght@400;600;700&family=Montserrat:wght@500;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/tokens.css" />
  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/header.css" />

  <style>
    body, .page { background: #f8f9fa; }

    .loading-card {
      width: 100%;
      max-width: 705px;
      background: #fff;
      border: 1px solid var(--border-card);
      border-radius: 12px 12px 0 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
    }

    .loading-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      width: 296px;
      text-align: center;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid #e1e1eb;
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-title {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 20px;
      line-height: 28px;
      color: #3b3a45;
      font-feature-settings: "lnum" 1, "tnum" 1;
    }

    @media (min-width: 761px) {
      .loading-card { min-height: 657px; }
    }

    @media (max-width: 760px) {
      .loading-card { padding: 48px 16px; }
      .loading-inner { width: 100%; }
    }

    .loading-subtitle {
      font-weight: 400;
      font-size: 14px;
      line-height: 20px;
      color: #575768;
      letter-spacing: 0.1px;
      font-feature-settings: "lnum" 1, "tnum" 1;
      margin-top: 4px;
    }
  </style>
</head>
<body>
<div class="page">

  <!-- ── HEADER ── -->
  <header class="header">
    <img class="header-logo" src="assets/icons/logo-fid.svg" alt="FID by Lakaut" />
    <span class="header-title">Validación de identidad</span>
    <button class="icon-btn" onclick="window.location.href=sessionStorage.getItem('flow')==='pf'?'inicio.html':'login.html'" aria-label="Cerrar">
      <span class="icon">close</span>
    </button>
  </header>

  <!-- ── CONTENT ── -->
  <main class="content-area">
<div class="card-wrap">
    <div class="loading-card">
      <div class="loading-inner">
        <div class="spinner"></div>
        <div>
          <p class="loading-title">Estamos validando tu identidad</p>
          <p class="loading-subtitle">Aguardá unos segundos mientras verificamos tus datos biométricos.</p>
        </div>
      </div>
    </div>
    <div class="card-footer">
      <span class="powered-label">POWERED BY</span>
      <img class="powered-logo" src="assets/icons/logo-fid.svg" alt="FID by Lakaut" />
    </div>
    </div><!-- /.card-wrap -->
  </main>

</div>

<script>
  setTimeout(() => { window.location.href = 'validacion-exitosa.html'; }, 3000);
</script>
</body>
</html>
